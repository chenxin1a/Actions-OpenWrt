name: 📦 Build Multiple IPKs

on:
  workflow_dispatch:
    inputs:
      device_name:
        description: '设备型号 (用于 Release 命名)'
        required: true
        default: ''
      repo_url:
        description: '源码地址'
        required: true
        default: 'https://github.com/immortalwrt/immortalwrt'
      repo_branch:
        description: '源码分支'
        required: true
        default: 'main'
      repo_commit:
        description: '指定 Commit ID (可选)'
        required: false
      package_list:
        description: '要编译的包列表 (用空格分隔路径)'
        required: true
        default: ''
      use_cache:
        description: '是否启用 GitHub 云端同步缓存 (true/false)'
        required: true
        default: 'false'

env:

  TZ: Asia/Shanghai
  CCACHE_DIR: /workdir/.ccache
jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: 🙌 Checkout
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 1
      - name: 🪠 Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
          
      - name: 🛠️ Init Environment
        run: |
          sudo -E apt-get -qq update
          sudo apt-get install -y --no-install-recommends libncurses-dev build-essential git wget python3 bzip2
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: ⚙️ Sync Cache from GitHub (Optional)
        if: github.event.inputs.use_cache == 'true'
        uses: actions/cache@v4
        with:
          path: |
            /workdir/openwrt/dl
            ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ipk-v1-${{ github.event.inputs.device_name }}-${{ github.event.inputs.repo_branch }}
          restore-keys: |
            ${{ runner.os }}-ipk-v1-${{ github.event.inputs.device_name }}-

      - name: 🪜 Clone source code
        working-directory: /workdir
        run: |
          if [ ! -d "openwrt" ]; then
            git clone ${{ github.event.inputs.repo_url }} -b ${{ github.event.inputs.repo_branch }} --single-branch --filter=blob:none openwrt
          fi
          cd openwrt
          git fetch origin ${{ github.event.inputs.repo_branch }}
          git checkout ${{ github.event.inputs.repo_branch }}
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: 📥 Run DIY-P3 & Update Feeds
        working-directory: /workdir/openwrt
        run: |
          [ -f $GITHUB_WORKSPACE/diy-part3.sh ] && cp $GITHUB_WORKSPACE/diy-part3.sh .
          chmod +x diy-part3.sh && ./diy-part3.sh
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 🕵️ SSH Connection (Manual Menuconfig)
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30

      - name: 🔨 Build Multiple Packages
        working-directory: /workdir/openwrt
        run: |
          export CCACHE_DIR=${{ env.CCACHE_DIR }}
          # 检查 .config 是否存在，防止误操作
          if [ ! -f .config ]; then
            echo "❌ 未检测到 .config 文件，请在 SSH 阶段执行 make menuconfig 并保存"
            exit 1
          fi

          # 确保工具链就绪
          make defconfig
          make tools/install -j$(nproc)
          make toolchain/install -j$(nproc)
          make target/linux/compile -j$(nproc)
          
          PACKAGES="${{ github.event.inputs.package_list }}"
          for PKG in $PACKAGES; do
            echo "🚀 正在编译: $PKG"
            make package/$PKG/clean
            # 使用 ccache 加速编译
            make package/$PKG/compile V=s -j$(nproc) CC="ccache gcc" CXX="ccache g++"
          done

      - name: 📂 Organize Files
        run: |
          mkdir -p ./ipk_out
          # 寻找本次编译生成的 ipk
          find /workdir/openwrt/bin/packages/ -name "*.ipk" -exec cp -f {} ./ipk_out/ \;
          echo "PACKTIME=$(date +'%Y%m%d%H%M')" >> $GITHUB_ENV

      - name: 🚀 Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: IPK-${{ github.event.inputs.device_name }}-${{ env.PACKTIME }}
          files: ./ipk_out/*.ipk
          body: |
            ### 🛠 编译完成
            - **设备**: ${{ github.event.inputs.device_name }}
            - **目标包**: `${{ github.event.inputs.package_list }}`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
